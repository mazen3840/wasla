pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "com.android.application" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "1.8.22" apply false
    id "dev.flutter.flutter-gradle-plugin" version "3.19.6" apply false
}

include ':app'

// ربط البلاجنز يدوي عشان نقفل الحوار ده تماماً
include ':shared_preferences_android'
project(':shared_preferences_android').projectDir = new File(settingsDir, '../.pub-cache/hosted/pub.dev/shared_preferences_android-2.2.2/android')

